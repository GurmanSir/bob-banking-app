<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SecureBank{% endblock %}</title>

  <!-- Bootstrap 5 CDN -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />

  <!-- Custom overrides -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />

  {% block extra_head %}{% endblock %}
</head>
<body class="bg-light">

  <!-- Top navigation bar -->
  {% if session.get('customer_id') %}
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">&#127968; SecureBank</span>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white small">{{ session.get('customer_name', '') }}</span>
        <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
      </div>
    </div>
  </nav>
  {% else %}
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <span class="navbar-brand fw-bold">&#127968; SecureBank</span>
    </div>
  </nav>
  {% endif %}

  <!-- Page content -->
  <main class="container pb-5">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="text-center text-muted small py-3 border-top mt-4">
    SecureBank &copy; {{ 2025 }} &mdash; Demo Application
  </footer>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmF5eE3syp3BVR8ckYCJtxoKzZ5a"
    crossorigin="anonymous"
  ></script>
</body>
</html>
